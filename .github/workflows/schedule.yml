name: Zenquant Auto-Inject

on:
  schedule:
    # Runs exactly every 3 hours (e.g., 00:00, 03:00, 06:00 UTC)
    - cron: '0 */3 * * *'
  
  # This allows you to manually click a "Run workflow" button on GitHub to test it
  workflow_dispatch: 

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Get Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package.json').devDependencies.playwright)")" >> $GITHUB_ENV

    - name: Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps

    - name: Install Playwright System Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium

    - name: Run Injection Script
      run: node inject.js

    # Optional: Automatically save any refreshed session cookies back to the repository
    # This helps prolong the life of the session without needing manual logins as frequently
    - name: Commit updated session state
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add storageState.json
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update session state" && git push)
