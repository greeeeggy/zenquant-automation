name: Zenquant Auto-Inject

on:
  schedule:
    # Safety net only: fires once daily at midnight UTC.
    # The real 3-hour rolling schedule is driven by the Cloudflare Worker (see cloudflare-worker/).
    # If the Worker chain ever breaks, this guarantees the job runs at least once per day.
    - cron: '0 0 * * *'
  
  # This allows you to manually click a "Run workflow" button on GitHub to test it
  workflow_dispatch: 

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Get Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package.json').devDependencies.playwright)")" >> $GITHUB_ENV

    - name: Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps

    - name: Install Playwright System Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium

    - name: Restore session state cache
      uses: actions/cache@v4
      with:
        path: storageState.json
        # Key rotates per run so we always save the freshest session
        key: session-state-${{ github.run_id }}
        restore-keys: session-state-

    - name: Run Injection Script
      env:
        ZENQUANT_PHONE: ${{ secrets.ZENQUANT_PHONE }}
        ZENQUANT_PASSWORD: ${{ secrets.ZENQUANT_PASSWORD }}
      run: node inject.js

    # Write the next_run.txt timestamp so the Cloudflare Worker knows when to fire next.
    # storageState.json is persisted via actions/cache above — not committed to the repo.
    - name: Schedule next run
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # Stamp the next allowed run time: 3 hours (10800 seconds) from now
        NEXT_RUN=$(($(date +%s) + 10800))
        echo "$NEXT_RUN" > next_run.txt
        echo "Next run unlocks at: $(date -u -d @$NEXT_RUN '+%Y-%m-%d %H:%M:%S UTC')"

        git add next_run.txt
        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "chore: next run scheduled $(date -u -d @$NEXT_RUN '+%H:%M UTC')" && git push)
